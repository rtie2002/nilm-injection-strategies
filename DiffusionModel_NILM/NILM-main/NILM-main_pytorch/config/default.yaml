# NILM-main PyTorch — defaults (Geng Table 3)

data:
  # Relative to NILM-main_pytorch/ — works on any machine (Desktop, D:\Raymond, etc.)
  data_root: ../dataset_preprocess/created_data/UK_DALE
  dataset_name: UK_DALE
  train_percent: "20"
  augmented: false

model:
  name: easy_s2s

dataloader:
  num_workers: 2
  pin_memory: true
  batch_size:
    easy_s2s: 1024
    s2p: 128
    fcn: 256
    auglpn: 128

training:
  device: auto          # auto | cuda | cpu
  require_cuda: true    # error at startup if no GPU (set false or use --cpu to allow CPU)
  gpu_id: 0
  seed: 2024
  epochs: 100
  patience: 20
  lr: 0.001
  huber_delta: 0.5
  regression_alpha: 1.0
  switch_beta: 0.1
  progress_batches: false   # set true only for debugging
  # Per-model overrides (Geng *_train.py defaults)
  per_model:
    easy_s2s:
      epochs: 100
      patience: 20
    s2p:
      epochs: 100
      patience: 10
    fcn:
      epochs: 300
      patience: 35
    auglpn:
      epochs: 100
      patience: 18

evaluation:
  sample_second: 6.0
  metrics_every_epochs: 5   # full MAE/SAE/F1 (val loss every epoch; faster training)
  ewma_alpha: 0.9
  apply_ewma_when_augmented: true

paths:
  # Relative to NILM-main_pytorch/
  checkpoint_dir: checkpoints
  results_dir: results
